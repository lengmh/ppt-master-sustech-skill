<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1280 720" width="1280" height="720"
  data-pptx-master="sustech_academic_master" data-pptx-master-name="SUSTech Academic"
  data-pptx-layout="section" data-pptx-layout-name="Section Header">
  <rect id="sustech-master-background" x="0" y="0" width="1280" height="720" fill="#FFFFFF"
    data-pptx-layer="master" data-pptx-editable="false"/>

  <path id="section-lower-field" d="M 0 484 L 1280 484 L 1280 720 L 0 720 Z" fill="#EAF1F0"
