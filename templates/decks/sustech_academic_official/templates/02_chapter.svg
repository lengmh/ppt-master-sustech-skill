  <path id="section-lower-accent" d="M 0 610 L 1280 540 L 1280 720 L 0 720 Z" fill="#01ABA8" fill-opacity="0.05"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <image id="section-school-motif" href="../images/top_left_motif_standard.png" x="0" y="13" width="70" height="62"
    preserveAspectRatio="xMidYMid meet" data-pptx-layer="layout" data-pptx-editable="false"/>
  <image id="section-school-logo" href="../images/full_top_right_school_logo.png" x="1060" y="13" width="220" height="66"
    preserveAspectRatio="xMidYMid meet" data-pptx-layer="layout" data-pptx-editable="false"/>
  <line id="section-header-rule" x1="92" y1="76" x2="1188" y2="76" stroke="#CECECE" stroke-width="1"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <line id="section-title-accent" x1="308" y1="376" x2="616" y2="376" stroke="#E3660D" stroke-width="4"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <line id="section-footer-rule" x1="92" y1="688" x2="1188" y2="688" stroke="#CECECE" stroke-width="1"
    data-pptx-layer="layout" data-pptx-editable="false"/>
  <text id="section-footer-label" x="92" y="704" fill="#9D9D9D" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13"
    data-pptx-layer="layout" data-pptx-editable="false">Southern University of Science and Technology</text>

  <g id="section-number-slot" data-pptx-placeholder="body" data-pptx-idx="1" data-pptx-bounds="92 168 190 190">
    <text id="section-number-carrier" data-pptx-carrier="true" x="92" y="346" fill="#003F43" fill-opacity="0.10"
      font-family="Arial, sans-serif" font-size="176" font-weight="bold">{{CHAPTER_NUM}}</text>
  </g>
  <g id="section-title-slot" data-pptx-placeholder="title" data-pptx-bounds="308 286 800 70">
    <text id="section-title-carrier" data-pptx-carrier="true" x="308" y="344" fill="#003F43"
      font-family="Microsoft YaHei, Arial, sans-serif" font-size="50" font-weight="bold">{{CHAPTER_TITLE}}</text>
  </g>
